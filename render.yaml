services:
  - type: web
    name: ren-gateway
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ADMIN_PASSWORD
        value: admin
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./ren.db
      - key: CUSTOM_DOMAIN
        value: ""
      - key: PORT
        value: 8000
    build:
      pythonVersion: 3.13
